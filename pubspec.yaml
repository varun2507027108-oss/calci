name: calcuon
description: "Calcuon — Premium next-generation scientific calculator"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.8.0

  # Storage
  hive_flutter: ^1.1.0
  hive: ^2.2.3

  # Math & Rendering
  flutter_math_fork: ^0.7.2
  math_expressions: ^2.6.0

  # UI
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.2

  # Utilities
  uuid: ^4.5.1
  intl: ^0.19.0
  share_plus: ^10.1.4
  path_provider: ^2.1.5
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  riverpod_generator: ^2.4.0
  build_runner: ^2.4.13
  hive_generator: ^2.0.1
  mocktail: ^1.0.4

flutter:
  uses-material-design: true


  assets:
    - assets/data/
    - assets/icons/
